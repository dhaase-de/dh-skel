#
# general
#

# allow mouse for tmux control
set-option -g mouse on

# renumber windows when one is closed
set-option renumber-windows on

# disallow multiple tmux keys triggering after one prefix key hit
# this being disallowed is especially useful for arrow keys, as it prevents having to
# wait some time to be able to use the arrow keys again after switching panes with the
# arrow keys
set-option repeat-time 0

# increase buffer size
set-option -g history-limit 50000

# change window list appearance
set-option -g window-status-last-style "fg=black,bg=gray,bold"
set-option -g window-status-current-style "fg=black,bg=yellow,bold"
set-option -g window-status-separator "| "

#
# key bindings
#

# use C-a instead of C-b as prefix (screen-like)
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# prefix + b: new session
bind-key b command-prompt -p "Enter new session name:" "new-session -s '%%'"

# prefix + r: reload config file
unbind-key r
bind-key r source-file ~/.tmux.conf \; display-message -d 500 "Config reloaded!"

